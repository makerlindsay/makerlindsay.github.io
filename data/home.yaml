      title: "The Gathering"
      subtitle: "Leadership & Facilitation"
      body: "Bringing people together to find shared focus and genuine belonging — without pressure or forced intensity."
    - number: "02"
      title: "The Container"
      subtitle: "Space Holding"
      body: "Holding steady, regulated spaces during moments of transition or vulnerability — for depth, trust, and honesty."
    - number: "03"
      title: "The Ceremony"
      subtitle: "Ritual & Meaning"
      body: "Grounded, inclusive rituals to mark threshold moments — openings, closings, milestones, and transitions."
    - number: "04"
      title: "Meaning Made Together"
      subtitle: "Co-Created Experiences"
      body: "Participatory structures where the group builds its own meaning through collaborative making and reflection."
    - number: "05"
      title: "Workshops"
      subtitle: "Meaningful Making"
      body: "Structured creative sessions on self-leadership, values, and storytelling — turning insight into collective tools."

