presence:
  label: "Philosophy"
  heading: "Where presence becomes leadership"
  heading_em: "leadership"
  body1: "I lead with steadiness rather than force. With structure that creates safety, and openness that invites participation."
  body2: "My role is to set the tone and hold the container, so individuals can show up fully and the group can move together with trust and coherence. When presence is grounded, leadership becomes felt rather than performed."
  signature: "— Lindsay Balfour"
  card_quote: "I don't create for people. I create with them."

pillars:
  label: "What I Offer"
